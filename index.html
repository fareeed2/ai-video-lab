<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Lab - Pro Editor</title>
    <!-- COI Worker for SharedArrayBuffer (FFmpeg requirement) -->
    <script src="https://cdn.jsdelivr.net/npm/coi-serviceworker/coi-serviceworker.min.js"></script>
    <style>
        :root { --primary: #00f2fe; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { padding: 20px; text-align: center; background: linear-gradient(90deg, #00f2fe, #4facfe); width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .main-container { width: 90%; max-width: 1200px; display: grid; grid-template-columns: 3fr 1fr; gap: 20px; margin-top: 30px; }
        .preview-area { background: #1e293b; border-radius: 15px; padding: 20px; border: 2px border: solid #334155; position: relative; }
        video { width: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls-panel { background: #1e293b; border-radius: 15px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { background: #334155; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: var(--primary); color: #000; }
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>AI VIDEO LAB PRO</h1>
        <p>Unlimited Free AI Processing in Browser</p>
    </div>

    <div class="main-container">
        <div class="preview-area">
            <video id="player" controls></video>
            <div id="status" style="margin-top: 10px; color: var(--primary);">System: Waiting for Video...</div>
        </div>

        <div class="controls-panel">
            <h3>AI Tools</h3>
            <input type="file" id="uploader" accept="video/*" style="font-size: 12px;">
            <button class="btn" id="btn-bw">B&W Filter (AI Core)</button>
            <button class="btn" id="btn-trim">Trim first 5 sec</button>
            <button class="btn" id="btn-export" style="background: #22c55e;">Export Video</button>
            <div class="loader" id="loader"></div>
            <a id="download-link" style="display:none; color: var(--primary); text-decoration: none;">Download Ready!</a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
